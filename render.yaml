services:
  - type: web
    name: fuzzai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # You will enter this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false        # You will paste your Vercel URL here after deploying frontend
